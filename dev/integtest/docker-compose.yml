x-jenkins-common: &jenkins-common
  build:
    context: ./docker
    dockerfile: Dockerfile
  restart: unless-stopped
  healthcheck:
    # /jenkins/ プレフィックスでアクセス（コンテナ内ポートは 8080）
    test: ["CMD", "curl", "-fsS", "http://localhost:8080/jenkins/login"]
    interval: 10s
    timeout: 5s
    retries: 30
    start_period: 90s

services:
  jenkins-8081:
    <<: *jenkins-common
    container_name: lrr-jenkins-8081
    ports:
      - "8081:8080"
    volumes:
      - ./jh8081:/var/jenkins_home

  jenkins-8082:
    <<: *jenkins-common
    container_name: lrr-jenkins-8082
    ports:
      - "8082:8080"
    volumes:
      - ./jh8082:/var/jenkins_home

  jenkins-8083:
    <<: *jenkins-common
    container_name: lrr-jenkins-8083
    ports:
      - "8083:8080"
    volumes:
      - ./jh8083:/var/jenkins_home
